# Stack de producción (docs/04 §Despliegue): app + postgres + caddy.
# Uso: docker compose -f docker/docker-compose.yml --env-file docker/.env …
# La BD de DESARROLLO vive en docker-compose.dev.yml (puerto 5433) y no
# tiene nada que ver con esta.

name: claude-solutions-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Sin `ports`: solo accesible desde la red interna del stack.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?}
      # Requeridas: el arranque ejecuta seed, que crea el admin la 1ª vez.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?set SEED_ADMIN_EMAIL in docker/.env}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?set SEED_ADMIN_PASSWORD in docker/.env}
      UPLOADS_DIR: ${UPLOADS_DIR:-/data/uploads}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # node:22-alpine trae wget de busybox; falla con estado HTTP >= 400.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Sin DOMAIN sirve http://localhost (verificación local); con un
      # dominio real Caddy emite TLS automáticamente.
      DOMAIN: ${DOMAIN:-localhost:80}
    volumes:
      - ../docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  internal:
