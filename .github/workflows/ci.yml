name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # Desde F6-T2 el job usa un Postgres REAL (service container): los env
    # dummies del fix de F0-T3 ya no hacen falta porque la conexión existe
    # de verdad — el build sigue sin tocarla, y el E2E completo (migrate +
    # seed + full-flow) la necesita. Valores exclusivos de CI, no secretos.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      BETTER_AUTH_SECRET: ci-dummy-secret-0123456789abcdef0123456789abcdef0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SEED_ADMIN_EMAIL: ci-admin@claude-solutions.dev
      SEED_ADMIN_PASSWORD: ci-abracadabra-admin
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - run: pnpm exec playwright install --with-deps chromium

      # E2E completo contra la BD real: migraciones (esquema) + seed
      # (estructura, checklists, quiz) + content:apply (cuerpos de lección).
      - run: pnpm db:migrate

      - run: pnpm db:seed

      # Vuelca content/courses/**/*.md a lessons.content_md. Idempotente y
      # SIEMPRE tras el seed (que crea la estructura): sin este paso las
      # lecciones quedarían con "[REDACTAR]" fuera de desarrollo y el render
      # del cuerpo fallaría. Aborta (exit 1) si un .md no casa con un slug.
      - run: pnpm content:apply

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
